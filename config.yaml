bot:
  token:    "YOUR_BOT_TOKEN"   # 从 @BotFather 获取
  admin_id: 123456789          # 管理员（你）的 Telegram 用户 ID
  name:     "双向私聊机器人"
  version:  "3.0.0"

# 双向私聊机器人加载的模块
modules:
  - modules.private_chat_module

# 可自定义的提示文案
messages:
  welcome:       "👋 你好！直接发送消息即可联系管理员，我们会尽快回复你。"
  admin_welcome: "👋 管理员你好！用户的消息会转发到这里，直接「回复」某条消息即可回复对应用户。"
  received:      ""   # 用户发送后给用户的回执，留空则不发送
  banned:        "⛔ 你已被封禁，无法发送消息。"
