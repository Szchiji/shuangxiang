bot:
  token:    "YOUR_PLATFORM_BOT_TOKEN"   # 从 @BotFather 获取
  admin_id: 123456789                   # 你的 Telegram 用户 ID
  name:     "我的ModularBot平台"
  version:  "2.0.0"
  website:  "https://example.com"

web:
  username:   "admin"
  password:   "yourpassword"            # 建议修改！
  secret_key: "change-this-secret-key" # 务必修改！

# 平台主Bot加载的模块
modules:
  - modules.platform_module
  - modules.admin_module
  - modules.admin_manager_module
  - modules.forward_module
  - modules.auto_reply_module
  - modules.scheduler_module
  - modules.group_module
  - modules.menu_module

# 每个租户Bot自动加载的模块
tenant_modules:
  - modules.store_module
  - modules.form_module
  - modules.forward_module
  - modules.auto_reply_module
  - modules.admin_module
  - modules.menu_module

auto_reply:
  "价格":  "💰 请查看定价：https://example.com/price"
  "帮助":  "📖 发送 /help 查看帮助"
  "你好":  "👋 你好！有什么可以帮到你？"

group:
  welcome_message: "👋 欢迎 {name} 加入！请遵守群规 🙏"
  max_warns: 3
  banned_keywords:
    - "广告"
    - "赌博"
